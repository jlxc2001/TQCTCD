plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.jlxc.teleprompter'
    compileSdk 35

    androidResources {
        noCompress += ['onnx', 'txt', 'model']
    }

    defaultConfig {
        applicationId 'com.jlxc.teleprompter'
        minSdk 23
        targetSdk 35
        versionCode 3
        versionName '0.3.0-xlarge-asr'
        ndk {
            abiFilters 'arm64-v8a'
        }
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.aar'])
}
