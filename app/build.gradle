plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.jlxc.teleprompter'
    compileSdk 35

    defaultConfig {
        applicationId 'com.jlxc.teleprompter'
        minSdk 23
        targetSdk 35
        versionCode 2
        versionName '0.2.0-asr'
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.aar'])
}
