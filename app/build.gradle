plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.jlxc.teleprompter'
    compileSdk 35

    androidResources {
        noCompress += ['onnx', 'txt', 'model']
    }

    defaultConfig {
        applicationId 'com.jlxc.teleprompter'
        minSdk 23
        targetSdk 35
        versionCode 4
        versionName '0.3.1-xlarge-asr-jvmfix'
        ndk {
            abiFilters 'arm64-v8a'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.aar'])
}
